Summary: FeedTV es una aplicación que te permite leer noticias de cualquier medio mediante RSS además de poder ver canales públicos de TV en cualquier lugar
Description: |-
    FeedTV es una aplicación que te permite leer noticias de cualquier medio mediante RSS además de poder ver canales públicos de TV y listas m3u8 en cualquier lugar.

    Características principales:
    * Lector de noticias: Soporte completo para feeds RSS y Atom de cualquier medio.
    * Televisión en vivo: Acceso a canales de TV públicos y comunitarios.
    * Reproducir listas M3U8 personalizadas

    Este proyecto utiliza fuentes de confianza como TDTChannels para la lista
    de canales y se apoya en una comunidad global para las traducciones.

