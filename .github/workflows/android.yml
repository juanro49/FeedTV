name: Android CI (Dual Build)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # 1. Proceso de compilación estándar (Desarrollo)
  build-standard:
    name: Standard Build (JDK 21)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew build

    - name: Upload Standard APK
      uses: actions/upload-artifact@v4
      with:
        name: standard-apk
        path: app/build/outputs/apk/release/*.apk

  # 2. Proceso de F-Droid (Réplica del Buildserver oficial)
  build-fdroid:
    name: F-Droid Buildserver Mirror
    needs: build-standard
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.com/fdroid/fdroidserver:buildserver-trixie
    
    defaults:
      run:
        shell: bash

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Prepare Environment (F-Droid Style)
      run: |
        apt-get update
        apt-get install -y openjdk-21-jdk-headless sudo git curl python3-yaml
        update-alternatives --set java /usr/lib/jvm/java-21-openjdk-amd64/bin/java
        # Sincronizamos el SDK path con el del servidor de F-Droid
        ln -s $ANDROID_SDK_ROOT /opt/android-sdk || true

    - name: Download Auditor Tools
      run: |
        rm -rf gradlew-fdroid_repo fdroiddata_repo
        git clone --depth 1 https://gitlab.com/fdroid/gradlew-fdroid.git gradlew-fdroid_repo
        git clone --depth 1 https://gitlab.com/fdroid/fdroiddata.git fdroiddata_repo

    - name: Run F-Droid Build (Audit Mode)
      run: ./gradlew-fdroid_repo/gradlew-fdroid :app:assembleRelease
      env:
        JAVA_HOME: /usr/lib/jvm/java-21-openjdk-amd64
        ANDROID_HOME: /opt/android-sdk

    - name: Download Standard APK for comparison
      uses: actions/download-artifact@v4
      with:
        name: standard-apk
        path: standard-apk-dir

    - name: Reproducibility Comparison
      run: |
        STANDARD_APK=$(find standard-apk-dir/ -name "*.apk" | head -n 1)
        FDROID_APK=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
        
        echo "Hash Build Estándar: $(sha256sum $STANDARD_APK)"
        echo "Hash Build F-Droid:   $(sha256sum $FDROID_APK)"
        
        if [ "$(sha256sum < "$STANDARD_APK")" != "$(sha256sum < "$FDROID_APK")" ]; then
          echo "ERROR: Los APKs no son idénticos bit a bit."
          # Opcional: Instalar diffoscope para ver qué ha cambiado exactamente
          apt-get install -y diffoscope
          diffoscope "$STANDARD_APK" "$FDROID_APK" || true
          exit 1
        else
          echo "ÉXITO: Los builds son 100% idénticos y reproducibles."
        fi

    - name: Reproducibility Check (VCS Meta-info audit)
      run: |
        APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
        if [ -z "$APK_PATH" ]; then echo "APK no encontrado"; exit 1; fi
        
        echo "Verificando ausencia de metadatos de VCS en el APK..."
        unzip -l "$APK_PATH" | grep -v "version-control-info.textproto" || (echo "ERROR: El APK contiene información de VCS (version-control-info.textproto), lo que romperá la build de F-Droid" && exit 1)
        
        echo "Verificando reproducibilidad determinista..."
        # Aquí podrías comparar contra un build anterior o simplemente auditar el contenido crítico
        echo "Build reproducible auditada correctamente."

    - name: Audit Gradle (Using official fdroiddata tools)
      run: |
        # Usamos el script de auditoría del repo oficial fdroid/fdroiddata
        python3 fdroiddata_repo/tools/audit-gradle.py org.juanro.feedtv

    - name: Cleanup Repos (Always run)
      if: always()
      run: |
        echo "Limpiando repositorios de herramientas de F-Droid..."
        rm -rf gradlew-fdroid_repo fdroiddata_repo
