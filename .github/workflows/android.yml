name: Android CI (Dual Build)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # --- 1: Compilación Estándar ---
  build-standard:
    name: ✯ Standard Build (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Standard APK
        uses: actions/upload-artifact@v4
        with:
          name: standard-apk
          path: app/build/outputs/apk/release/*.apk

  # --- 2: Compilación F-Droid ---
  build-fdroid:
    name: ✯ F-Droid Build
    runs-on: ubuntu-latest
    container: registry.gitlab.com/fdroid/fdroidserver:buildserver-trixie
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install F-Droid Server Master
        run: |
          apt-get update && apt-get install -y --no-install-recommends curl git python3-pip python3-setuptools
          mkdir -p /opt/fdroidserver
          curl --silent https://gitlab.com/fdroid/fdroidserver/-/archive/master/fdroidserver-master.tar.gz | tar -xz --directory=/opt/fdroidserver --strip-components=1
          cd /opt/fdroidserver
          pip3 install --break-system-packages .
      - name: Build with F-Droid
        run: |
          export LANG=en_US.UTF-8
          
          # 1. Estructura para F-Droid (Copia física completa, incluyendo .git)
          mkdir -p /tmp/src
          cp -a . /tmp/src/
          mkdir -p build/org.juanro.feedtv
          cp -a /tmp/src/. build/org.juanro.feedtv/
          
          # 2. Modificar YAML para el CI (sin Binaries y con commit actual)
          sed -i '/Binaries:/d' metadata/org.juanro.feedtv.yml
          sed -i "s/commit: .*/commit: $GITHUB_SHA/" metadata/org.juanro.feedtv.yml
          
          # 3. Garantizar que F-Droid encuentre el commit localmente
          git config --global --add safe.directory "*"
          cd "build/org.juanro.feedtv"
          git config user.email "ci@fdroid.org"
          git config user.name "F-Droid CI"
          git tag -f "$GITHUB_SHA"
          
          # 4. Configuración de entorno y ejecución
          cd $GITHUB_WORKSPACE
          ln -s $ANDROID_SDK_ROOT /opt/android-sdk || true
          echo "sdk_path: /opt/android-sdk" > "config.yml"
          echo "java_paths: { 21: /usr/lib/jvm/java-21-openjdk-amd64 }" >> "config.yml"
          
          fdroid rewritemeta org.juanro.feedtv
          fdroid readmeta
          fdroid build --verbose --on-server --no-tarball org.juanro.feedtv
        env:
          ANDROID_HOME: /opt/android-sdk
      - name: Upload F-Droid APK
        uses: actions/upload-artifact@v4
        with:
          name: fdroid-apk
          path: unsigned/*.apk

  # --- 3: Comparación ---
  compare:
    name: 🔍 Binary Comparison
    needs: [build-standard, build-fdroid]
    runs-on: ubuntu-slim
    steps:
      - name: Install Diffoscope
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends diffoscope
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: builds
      - name: Run Comparison
        run: |
          STANDARD_APK=$(find builds/standard-apk -name "*.apk" | head -n 1)
          FDROID_APK=$(find builds/fdroid-apk -name "*.apk" | head -n 1)
          echo "### Comparando Binarios ###"
          echo "Estándar: $STANDARD_APK"
          echo "F-Droid: $FDROID_APK"
          diffoscope --text-color=always "$STANDARD_APK" "$FDROID_APK" || (echo "¡ERROR: Diferencia binaria detectada!" && exit 1)
          echo "¡ÉXITO: El commit $GITHUB_SHA es 100% reproducible bit a bit!"
